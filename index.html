<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoNews | Global Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .nano-card { transition: all 0.2s ease-in-out; border-left: 4px solid transparent; }
        .nano-card:hover { border-left-color: #38bdf8; background: #0f172a; }
        .badge-medicine { background: #db2777; }
        .badge-energy { background: #059669; }
        .badge-electronics { background: #4f46e5; }
        .badge-materials { background: #d97706; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12 border-b border-slate-800 pb-6">
            <h1 class="text-4xl font-black tracking-tighter text-sky-400">NANONEWS</h1>
            <p class="text-slate-400 text-sm mt-1 uppercase tracking-widest">Global Nano-Scale Intelligence Aggregator</p>
        </header>

        <div id="news-list" class="space-y-4">
            <!-- News items will load here -->
        </div>
    </div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('news-list');
                container.innerHTML = data.map(item => `
                    <div class="nano-card bg-slate-900/40 p-5 rounded-r-xl border-y border-r border-slate-800">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="badge-${item.category.toLowerCase()} text-[10px] font-bold px-2 py-0.5 rounded text-white">
                                ${item.category}
                            </span>
                            <span class="text-xs font-bold text-slate-500 uppercase">${item.source}</span>
                        </div>
                        <a href="${item.link}" target="_blank" class="text-lg font-semibold hover:text-sky-400 transition block mb-2">
                            ${item.title}
                        </a>
                        <div class="text-[10px] text-slate-600 font-mono">${item.date}</div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('news-list').innerHTML = "<p class='text-red-400'>Data still syncing... please trigger the GitHub Action manually.</p>";
            });
    </script>
</body>
</html>

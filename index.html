<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoNews | Global Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .news-card { border-bottom: 1px solid #1e293b; transition: background 0.2s; }
        .news-card:hover { background-color: #0f172a; }
    </style>
</head>
<body class="p-6 md:p-20">
    <div class="max-w-3xl mx-auto">
        <header class="mb-12">
            <h1 class="text-5xl font-black tracking-tighter text-sky-400">NANONEWS</h1>
            <p class="text-slate-400 mt-2 font-medium">Real-time Global Nanotechnology Aggregator</p>
        </header>

        <div id="news-list" class="space-y-1">
            <!-- Data will load here -->
        </div>
    </div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('news-list');
                container.innerHTML = data.map(item => `
                    <div class="news-card py-6">
                        <span class="text-[10px] font-bold text-sky-500 uppercase tracking-widest">${item.source}</span>
                        <a href="${item.link}" target="_blank" class="text-xl font-bold block hover:text-sky-300 transition mt-1">
                            ${item.title}
                        </a>
                        <p class="text-xs text-slate-500 mt-2 italic">${item.date}</p>
                    </div>
                `).join('');
            })
            .catch(() => {
                document.getElementById('news-list').innerHTML = 
                    "<div class='p-4 bg-blue-900/20 text-blue-400 rounded'>Data is currently syncing. Please trigger the GitHub Action and wait 1 minute.</div>";
            });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoNews | Global Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .nano-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nano-card:hover { transform: translateY(-5px); border-color: #38bdf8; box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.2); }
        .badge-medicine { background: #db2777; }
        .badge-energy { background: #059669; }
        .badge-electronics { background: #4f46e5; }
        .badge-materials { background: #d97706; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-12 border-b border-slate-800 pb-8">
            <div>
                <h1 class="text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    NANONEWS
                </h1>
                <p class="text-slate-400 mt-2 font-medium">The Global Nanotechnology Pulse • 2026 Edition</p>
            </div>
            <div id="last-updated" class="text-xs text-slate-500 uppercase tracking-widest"></div>
        </header>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- News Loaded Here -->
        </div>
    </div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('last-updated').innerText = 'Last Updated: ' + new Date().toLocaleTimeString();
                const container = document.getElementById('news-grid');
                container.innerHTML = data.map(item => `
                    <div class="nano-card bg-slate-900/50 border border-slate-800 rounded-2xl overflow-hidden flex flex-col">
                        <div class="h-48 overflow-hidden relative">
                            <img src="${item.image}" alt="news" class="w-full h-full object-cover opacity-80 hover:opacity-100 transition">
                            <span class="absolute top-4 left-4 badge-${item.category.toLowerCase()} text-[10px] font-bold px-2 py-1 rounded text-white uppercase">
                                ${item.category}
                            </span>
                        </div>
                        <div class="p-6 flex-grow flex flex-col">
                            <span class="text-sky-400 text-xs font-bold uppercase mb-2">${item.source}</span>
                            <a href="${item.link}" target="_blank" class="text-lg font-bold leading-tight hover:text-sky-300 transition line-clamp-3 mb-4">
                                ${item.title}
                            </a>
                            <div class="mt-auto text-xs text-slate-500 italic">${item.date}</div>
                        </div>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
